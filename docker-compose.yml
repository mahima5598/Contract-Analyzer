services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - contract-app-network
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    # Ensure it binds to 0.0.0.0 so Docker can route traffic to it
    command: ["uvicorn", "backend.app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8501:8501"
    networks:
      - contract-app-network
    environment:
      # CRITICAL: Use 'backend' (the service name), not 'localhost'
      - API_BASE=http://backend:8000
    command: ["streamlit", "run", "frontend/streamlit_app/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    depends_on:
      - backend

networks:
  contract-app-network:
    driver: bridge