version: "3.8"
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=info
    depends_on:
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    command: >
      celery -A backend.jobs.celery_app.celery_app worker
      --loglevel=info --concurrency=2 --pool=threads
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=info
    depends_on:
      - redis
    volumes:
      - .:/app
